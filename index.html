<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroAI | Science AI, Business AI, General AI</title>

<meta name="description" content="NeuroAI is an advanced AI platform with powerful modes including NeuroAI, Science AI, Business AI, and General AI. Explore intelligence, science, and innovation in one place.">

<meta name="keywords" content="AI, NeuroAI, Science AI, Business AI, General AI, artificial intelligence, AI tools">

<meta name="author" content="NeuroAI">
<style>

body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
margin-bottom:10px;
}

/* MODE BUTTONS */

.mode-buttons{
margin-bottom:15px;
}

.mode-buttons button{
padding:10px 16px;
margin:5px;
border:none;
border-radius:8px;
background:#1e293b;
color:white;
cursor:pointer;
transition:0.3s;
}

.mode-buttons button:hover{
background:#334155;
}

/* ACTIVE BUTTON */

.active{
background:#007bff !important;
}

/* CHAT */

.chat-container{
max-width:700px;
margin:auto;
height:400px;
overflow-y:auto;
background:#1e293b;
border-radius:12px;
padding:10px;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.message{
padding:10px;
margin:10px;
border-radius:10px;
max-width:70%;
}

/* USER */

.user{
background:#007bff;
margin-left:auto;
text-align:right;
}

/* AI */

.ai{
background:#334155;
text-align:left;
}

/* INPUT */

.input-area{
margin-top:15px;
}

input{
width:60%;
padding:12px;
border-radius:8px;
border:none;
outline:none;
}

button.send-btn{
padding:12px 18px;
border:none;
background:#007bff;
color:white;
border-radius:8px;
cursor:pointer;
}

button.send-btn:hover{
background:#0056b3;
}

</style>
</head>

<body>

<h1>🧠 NeuroAI</h1>

<!-- MODES -->

<div class="mode-buttons">
<button onclick="setMode('neuro', this)" class="active">🧠 NeuroAI</button>
<button onclick="setMode('science', this)">🔬 Science AI</button>
<button onclick="setMode('business', this)">💼 Business AI</button>
<button onclick="setMode('general', this)">🌐 General AI</button>
</div>

<!-- CHAT -->

<div class="chat-container" id="chat"></div>

<!-- INPUT -->

<div class="input-area">
<input type="text" id="messageInput" placeholder="Ask NeuroAI anything..." />
<button class="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>

// 🧠 CURRENT MODE
let mode = "neuro";

// 🧾 SESSION ID (persistent per user)
let sessionId = localStorage.getItem("sessionId");

if (!sessionId) {
  sessionId = "session-" + Math.random().toString(36).substring(2);
  localStorage.setItem("sessionId", sessionId);
}

// 🔁 SWITCH MODE
function setMode(selectedMode, btn){

  mode = selectedMode;

  // highlight active button
  document.querySelectorAll(".mode-buttons button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  addMessage("⚡ Mode: " + selectedMode.toUpperCase(), "ai");
}

// 💬 ADD MESSAGE
function addMessage(text, sender){

  const chat = document.getElementById("chat");

  const message = document.createElement("div");
  message.className = "message " + sender;
  message.innerText = text;

  chat.appendChild(message);
  chat.scrollTop = chat.scrollHeight;
}

// 🚀 SEND MESSAGE
async function sendMessage(){

  const input = document.getElementById("messageInput");
  const text = input.value.trim();

  if(!text) return;

  addMessage(text,"user");
  input.value = "";

  try {

    const response = await fetch("https://neuroai-backend-2.onrender.com/api/ask", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        message: text,
        mode: mode,
        sessionId: sessionId
      }),
    });

    if (!response.ok) {
      throw new Error("Server error");
    }

    const data = await response.json();

    addMessage(data.reply || "No response", "ai");

  } catch (error) {
    console.error(error);
    addMessage("⚠️ Server error. Try again.", "ai");
  }
}

// ⌨️ ENTER TO SEND
document.getElementById("messageInput").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    sendMessage();
  }
});

</script>

</body>
</html>
