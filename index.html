<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroAI</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
text-align:center;
padding:20px;
}

h1{
margin-bottom:20px;
}

.chat-container{
max-width:700px;
margin:auto;
height:400px;
overflow-y:scroll;
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.message{
padding:10px;
margin:10px;
border-radius:10px;
max-width:70%;
}

.user{
background:#007bff;
color:white;
margin-left:auto;
text-align:right;
}

.ai{
background:#eeeeee;
text-align:left;
}

.input-area{
margin-top:15px;
}

input{
width:60%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
background:#007bff;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>

</head>
<body>

<h1>NeuroAI</h1>

<div class="chat-container" id="chat"></div>

<div class="input-area">
<input type="text" id="messageInput" placeholder="Ask NeuroAI anything..." />
<button onclick="sendMessage()">Send</button>
</div>

<script>

function addMessage(text, sender) {

const chat = document.getElementById("chat");

const message = document.createElement("div");

message.className = "message " + sender;

message.innerText = text;

chat.appendChild(message);

chat.scrollTop = chat.scrollHeight;

}

async function sendMessage(){

const input = document.getElementById("messageInput");

const text = input.value;

if(!text) return;

addMessage(text,"user");

input.value="";

try{

const response = await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
});

const data = await response.json();

addMessage(data.reply || data.message || "No response","ai");

}catch(error){

addMessage("Error connecting to AI","ai");

}

}

</script>

</body>
</html>
