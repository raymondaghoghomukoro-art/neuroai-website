<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroAI</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
text-align:center;
padding:20px;
}

h1{
margin-bottom:10px;
}

/* MODE BUTTONS */

.mode-buttons{
margin-bottom:15px;
}

.mode-buttons button{
padding:8px 14px;
margin:5px;
border:none;
border-radius:6px;
background:#333;
color:white;
cursor:pointer;
}

.mode-buttons button:hover{
background:#555;
}

/* CHAT AREA */

.chat-container{
max-width:700px;
margin:auto;
height:400px;
overflow-y:auto;
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.message{
padding:10px;
margin:10px;
border-radius:10px;
max-width:70%;
}

/* USER MESSAGE */

.user{
background:#007bff;
color:white;
margin-left:auto;
text-align:right;
}

/* AI MESSAGE */

.ai{
background:#eeeeee;
text-align:left;
}

/* INPUT AREA */

.input-area{
margin-top:15px;
}

input{
width:60%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button.send-btn{
padding:10px 15px;
border:none;
background:#007bff;
color:white;
border-radius:6px;
cursor:pointer;
}

button.send-btn:hover{
background:#0056b3;
}

</style>
</head>

<body>

<h1>NeuroAI</h1>

<!-- MODE BUTTONS -->

<div class="mode-buttons">
<button onclick="setMode('kids')">Kids AI</button>
<button onclick="setMode('business')">Business AI</button>
<button onclick="setMode('general')">General AI</button>
</div>

<!-- CHAT -->

<div class="chat-container" id="chat"></div>

<!-- INPUT -->

<div class="input-area">
<input type="text" id="messageInput" placeholder="Ask NeuroAI anything..." />
<button class="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>

/* CURRENT MODE */

let mode = "general";

function setMode(selectedMode){

mode = selectedMode;

addMessage("Mode switched to: " + selectedMode,"ai");

}

/* ADD MESSAGE TO CHAT */

function addMessage(text, sender){

const chat = document.getElementById("chat");

const message = document.createElement("div");

message.className = "message " + sender;

message.innerText = text;

chat.appendChild(message);

chat.scrollTop = chat.scrollHeight;

}

/* SEND MESSAGE */

async function sendMessage(){

  const input = document.getElementById("messageInput");
  const text = input.value.trim();

  if(!text) return;

  addMessage(text,"user");
  input.value = "";

  try {

    const response = await fetch("https://neuroai-backend-2.onrender.com/api/ask", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        message: text,
        mode: mode
      }),
    });

    // ✅ Check if server responded properly
    if (!response.ok) {
      throw new Error("Server error: " + response.status);
    }

    const data = await response.json();

    console.log("API response:", data);

    // ✅ Handle backend errors safely
    if (data.error) {
      addMessage("Error: " + data.error, "ai");
    } else {
      addMessage(data.reply || "No response from AI", "ai");
    }

  } catch (error) {
    console.error("Fetch error:", error);
    addMessage("⚠️ Unable to reach AI server", "ai");
  }

}
/* PRESS ENTER TO SEND */

document.getElementById("messageInput").addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendMessage();
}

});

</script>

</body>
</html>
